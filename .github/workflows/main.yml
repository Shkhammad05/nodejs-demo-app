name: CI/CD Core Enterprise Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Continuous Integration Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Context
        uses: actions/checkout@v4
      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Project Dependencies Safely
        run: npm ci
      - name: Execute Automated Test Suites
        run: npm test

  deploy-image:
    name: Continuous Deployment Stage
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Context
        uses: actions/checkout@v4
      - name: Authenticate to Docker Hub Registry Securely
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Ship Compiled Artifact
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-demo-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-demo-app:${{ github.sha }}